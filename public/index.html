<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CESUSC DevOps - N3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, Arial, sans-serif;
      background: #1b1033;
      color: #f5f3ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      background: #2a1a4a;
      padding: 48px 56px;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
      text-align: center;
      max-width: 540px;
    }
    h1 { font-size: 1.9rem; margin-bottom: 12px; }
    #versao { color: #b794f6; font-weight: 700; margin-bottom: 20px; }
    p { line-height: 1.5; margin-bottom: 16px; }
    button {
      background: #7c3aed;
      color: #fff;
      border: 0;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
    #resposta-api { margin-top: 18px; color: #a0f0c0; font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <h1 id="titulo">Pipeline DevOps - N3</h1>
    <p id="versao">Carregando versao...</p>
    <p id="mensagem">Aplicacao Node.js implantada automaticamente via CI/CD na AWS EC2.</p>
    <button id="btn-saudacao">Testar API</button>
    <p id="resposta-api"></p>
  </main>

  <script>
    // A versao exibida vem direto da API (/api/health). Assim, basta alterar
    // APP_VERSION em src/app.js que a pagina atualiza sozinha no proximo deploy.
    async function carregarVersao() {
      try {
        const resp = await fetch('/api/health');
        const dados = await resp.json();
        document.getElementById('versao').textContent = 'Versao ' + dados.versao;
      } catch (e) {
        document.getElementById('versao').textContent = 'Versao indisponivel';
      }
    }
    carregarVersao();

    document.getElementById('btn-saudacao').addEventListener('click', async () => {
      const alvo = document.getElementById('resposta-api');
      try {
        const resp = await fetch('/api/health');
        const dados = await resp.json();
        alvo.textContent = 'API: ' + dados.status + ' (versao ' + dados.versao + ')';
      } catch (e) {
        alvo.textContent = 'Erro ao chamar a API';
      }
    });
  </script>
</body>
</html>
