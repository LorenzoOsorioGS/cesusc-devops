name: CD - Deploy Continuo (EC2)

# Dispara em push para main (apos o merge de develop -> main) e manualmente.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy na instancia EC2 (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Conectar via SSH e atualizar o container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/cesusc-devops:latest
            docker stop cesusc-devops || true
            docker rm cesusc-devops || true
            docker run -d \
              --name cesusc-devops \
              --restart unless-stopped \
              -p 80:3000 \
              ${{ vars.DOCKERHUB_USERNAME }}/cesusc-devops:latest

  zap_scan:
    name: DAST - OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ success() }}
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://${{ vars.SERVER_IP }}'
