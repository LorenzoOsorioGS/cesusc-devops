name: CI - Integracao e Entrega Continua

# Dispara em push para develop, em pull requests para develop e manualmente.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  build-test:
    name: Lint, Testes de Unidade e Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Analise estatica de codigo (ESLint)
        run: npm run lint

      - name: Testes de unidade + cobertura
        run: npm test

      - name: Publicar relatorio de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  e2e:
    name: Teste de Interface (Selenium)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Rodar teste de interface (Selenium headless)
        run: npm run test:e2e

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Varredura de segredos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  delivery:
    name: Continuous Delivery (build e push da imagem Docker)
    runs-on: ubuntu-latest
    needs: [build-test, e2e]
    # So roda apos configurar a variavel DOCKERHUB_USERNAME (evita falha enquanto nao ha conta Docker Hub).
    if: github.ref == 'refs/heads/develop' && vars.DOCKERHUB_USERNAME != ''
    steps:
      - uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/cesusc-devops:latest
            ${{ vars.DOCKERHUB_USERNAME }}/cesusc-devops:${{ github.sha }}
